<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <h1>Focus</h1>
    <span class="subtitle">for YouTube</span>
  </div>
  <div class="toggles">
    <label class="toggle-row">
      <span class="toggle-label">Hide Shorts</span>
      <input type="checkbox" data-key="hideShorts">
      <span class="slider"></span>
    </label>
    <label class="toggle-row">
      <span class="toggle-label">Block Shorts Page</span>
      <input type="checkbox" data-key="blockShortsPage">
      <span class="slider"></span>
    </label>
    <label class="toggle-row">
      <span class="toggle-label">Hide Sidebar Recommendations</span>
      <input type="checkbox" data-key="hideSidebar">
      <span class="slider"></span>
    </label>
    <label class="toggle-row">
      <span class="toggle-label">Hide Topic Chips</span>
      <input type="checkbox" data-key="hideTopics">
      <span class="slider"></span>
    </label>
    <label class="toggle-row">
      <span class="toggle-label">Hide Explore Panels</span>
      <input type="checkbox" data-key="hideExplorePanels">
      <span class="slider"></span>
    </label>
    <label class="toggle-row">
      <span class="toggle-label">Hide Loading Grid</span>
      <input type="checkbox" data-key="hideGhostGrid">
      <span class="slider"></span>
    </label>
    <label class="toggle-row">
      <span class="toggle-label">Hide End Cards</span>
      <input type="checkbox" data-key="hideEndCards">
      <span class="slider"></span>
    </label>
    <label class="toggle-row">
      <span class="toggle-label">Hide Comments</span>
      <input type="checkbox" data-key="hideComments">
      <span class="slider"></span>
    </label>
  </div>
  <script src="popup.js"></script>
</body>
</html>
